<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Chart line (asset growth) -->
  <polyline points="100,360 180,320 260,280 340,220 420,140"
    fill="none" stroke="url(#chart)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot accents -->
  <circle cx="100" cy="360" r="14" fill="#ffffff" opacity="0.9"/>
  <circle cx="180" cy="320" r="14" fill="#ffffff" opacity="0.9"/>
  <circle cx="260" cy="280" r="14" fill="#ffffff" opacity="0.9"/>
  <circle cx="340" cy="220" r="14" fill="#ffffff" opacity="0.9"/>
  <circle cx="420" cy="140" r="14" fill="#ffffff" opacity="0.9"/>
  <!-- Up arrow accent -->
  <polygon points="420,100 400,130 440,130" fill="#ffffff" opacity="0.7"/>
</svg>
