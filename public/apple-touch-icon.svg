<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Subtle shine -->
  <rect width="180" height="90" rx="36" fill="rgba(255,255,255,0.06)"/>
  <!-- Chart line -->
  <polyline points="32,128 58,114 84,100 110,80 136,55 148,42"
    fill="none" stroke="url(#chart)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots -->
  <circle cx="32" cy="128" r="5" fill="white" opacity="0.85"/>
  <circle cx="58" cy="114" r="5" fill="white" opacity="0.85"/>
  <circle cx="84" cy="100" r="5" fill="white" opacity="0.85"/>
  <circle cx="110" cy="80" r="5" fill="white" opacity="0.85"/>
  <circle cx="136" cy="55" r="5" fill="white" opacity="0.85"/>
  <circle cx="148" cy="42" r="6.5" fill="white" opacity="0.95"/>
  <!-- Up arrow -->
  <polygon points="148,30 140,42 156,42" fill="white" opacity="0.75"/>
  <!-- Yen symbol -->
  <text x="90" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.55)">¥</text>
</svg>
